name: "delete-merged-action"
description: "Automatically delete merged branches (highly configurable)"
author: "Koj <https://github.com/koj.co>"
inputs:
  branches:
    required: false
    description: "List of branches to delete"
    default: "*,!master,!main"
  retarget_base:
    required: false
    description: "If set, retarget any open PRs with base=<deleted branch> to this branch (e.g. develop) before deletion"
runs:
  using: "node24"
  main: "dist/index.js"
branding:
  icon: "trash"
  color: "red"
